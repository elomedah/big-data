---
- name: Prepare all cluster machines
  hosts: cluster
  become: true
  roles:
    - common

- name: Prepare Hadoop data volumes
  hosts: masters:workers
  become: true
  roles:
    - storage

- name: Install and configure Hadoop
  hosts: hadoop
  become: true
  roles:
    - hadoop

- name: Expose Hadoop web UIs through the gateway
  hosts: gateway
  become: true
  roles:
    - gateway_proxy

- name: Create teaching accounts and quotas
  hosts: gateway
  become: true
  tags:
    - students
  roles:
    - students
